# This file was generated by "cookiecutter-zope-instance"
[app:zope]
use = {{ cookiecutter.wsgi_app_entrypoint }}
zope_conf = %(here)s/zope.conf

[server:main]
{%- if cookiecutter.wsgi_fast_listen %}
paste.server_factory = waitress_fastlisten:main
use = egg:waitress_fastlisten#main
fast-listen = {{ cookiecutter.wsgi_fast_listen }}
{%- else %}
use = egg:waitress#main
listen = {{ cookiecutter.wsgi_listen }}
{%- endif %}
threads = {{ cookiecutter.wsgi_threads }}
clear_untrusted_proxy_headers = {{ cookiecutter.wsgi_clear_untrusted_proxy_headers|lower }}
max_request_body_size = {{ cookiecutter.wsgi_max_request_body_size }}
{%- if cookiecutter.wsgi_channel_timeout %}
channel_timeout = {{ cookiecutter.wsgi_channel_timeout }}
{%- endif %}

{%- if cookiecutter.access_log_enabled %}

[filter:translogger]
use = egg:Paste#translogger
setup_console_handler = False

[pipeline:main]
pipeline =
{%- if cookiecutter.profile_repoze %}
    profile
{%- endif %}
    translogger
    egg:Zope#httpexceptions
    zope
{%- else %}

[pipeline:main]
pipeline =
{%- if cookiecutter.profile_repoze %}
    profile
{%- endif %}
    egg:Zope#httpexceptions
    zope
{%- endif %}

{%- if cookiecutter.profile_repoze %}

[filter:profile]
use = egg:repoze.profile
log_filename = {{ cookiecutter.profile_repoze_log_filename | abspath }}
cachegrind_filename = {{ cookiecutter.profile_repoze_cachegrind_filename | abspath }}
discard_first_request = {{ cookiecutter.profile_repoze_discard_first_request }}
path = /__profile__
flush_at_shutdown = {{ cookiecutter.profile_repoze_flush_at_shutdown }}
unwind = {{ cookiecutter.profile_repoze_unwind }}
{%- endif %}
{#- === Compute template variables === -#}
{#- Active formatter -#}
{%- if cookiecutter.log_format_class %}
{%-   set _active_formatter = 'custom' %}
{%- elif cookiecutter.log_format|lower == 'json' %}
{%-   set _active_formatter = 'json' %}
{%- else %}
{%-   set _active_formatter = 'generic' %}
{%- endif %}

{#- Effective log file paths -#}
{%- if cookiecutter.log_file_path %}
{%-   set _effective_log_file_path = cookiecutter.log_file_path | abspath %}
{%-   set _access_base = cookiecutter.log_file_path.rsplit('.', 1) %}
{%-   set _effective_access_log_path = (_access_base[0] ~ '-access.' ~ _access_base[1]) | abspath %}
{%- elif cookiecutter.location_log %}
{%-   set _effective_log_file_path = cookiecutter.location_log | abspath("instance.log") %}
{%-   set _effective_access_log_path = cookiecutter.location_log | abspath("instance-access.log") %}
{%- else %}
{%-   set _effective_log_file_path = (cookiecutter.target ~ "/var/log/instance.log") | abspath %}
{%-   set _effective_access_log_path = (cookiecutter.target ~ "/var/log/instance-access.log") | abspath %}
{%- endif %}

{#- Handler keys -#}
{%- set _handler_keys = [] %}
{%- if cookiecutter.log_stdout %}
{%-   set _ = _handler_keys.append('console') %}
{%- endif %}
{%- if cookiecutter.log_file %}
{%-   set _ = _handler_keys.append('eventlog') %}
{%- endif %}
{%- if cookiecutter.log_file and cookiecutter.access_log_enabled %}
{%-   set _ = _handler_keys.append('accesslog') %}
{%- endif %}
{%- if cookiecutter.log_syslog %}
{%-   set _ = _handler_keys.append('syslog') %}
{%- endif %}

{#- Root handlers (all except accesslog) -#}
{%- set _root_handlers = [] %}
{%- if cookiecutter.log_stdout %}
{%-   set _ = _root_handlers.append('console') %}
{%- endif %}
{%- if cookiecutter.log_file %}
{%-   set _ = _root_handlers.append('eventlog') %}
{%- endif %}
{%- if cookiecutter.log_syslog %}
{%-   set _ = _root_handlers.append('syslog') %}
{%- endif %}

{#- Wsgi handlers (all including accesslog) -#}
{%- set _wsgi_handlers = _root_handlers | list %}
{%- if cookiecutter.log_file and cookiecutter.access_log_enabled %}
{%-   set _ = _wsgi_handlers.append('accesslog') %}
{%- endif %}

{#- Logger keys -#}
{%- set _logger_keys = ['root'] %}
{%- if cookiecutter.access_log_enabled %}
{%-   set _ = _logger_keys.append('wsgi') %}
{%- endif %}
{%- for name in cookiecutter.logging_loggers %}
{%-   if name not in ('root', 'wsgi') %}
{%-     set _ = _logger_keys.append(name | replace('.', '_')) %}
{%-   endif %}
{%- endfor %}

{#- Formatter keys -#}
{%- set _formatter_keys = [_active_formatter] %}
{%- if cookiecutter.log_file and cookiecutter.access_log_enabled and _active_formatter == 'generic' %}
{%-   set _ = _formatter_keys.append('message') %}
{%- endif %}


[loggers]
keys = {{ _logger_keys | join(', ') }}

[handlers]
keys = {{ _handler_keys | join(', ') }}

[formatters]
keys = {{ _formatter_keys | join(', ') }}

[logger_root]
level = {{ cookiecutter.log_level }}
handlers = {{ _root_handlers | join(', ') }}

{%- if cookiecutter.access_log_enabled %}

[logger_wsgi]
level = INFO
handlers = {{ _wsgi_handlers | join(', ') }}
qualname = wsgi
propagate = 0
{%- endif %}

{%- for name, level in cookiecutter.logging_loggers.items() %}
{%-   if name not in ('root', 'wsgi') %}

[logger_{{ name | replace('.', '_') }}]
level = {{ level }}
handlers =
qualname = {{ name }}
{%-   endif %}
{%- endfor %}

{#- === Handlers === -#}

{%- if cookiecutter.log_stdout %}

[handler_console]
class = StreamHandler
args = (sys.{{ cookiecutter.log_stdout_stream }},)
level = NOTSET
formatter = {{ _active_formatter }}
{%- endif %}

{%- if cookiecutter.log_file %}

[handler_eventlog]
class = FileHandler
args = (r'{{ _effective_log_file_path }}', 'a')
kwargs = {}
level = NOTSET
formatter = {{ _active_formatter }}
{%- endif %}

{%- if cookiecutter.log_file and cookiecutter.access_log_enabled %}

[handler_accesslog]
class = FileHandler
args = (r'{{ _effective_access_log_path }}', 'a')
kwargs = {}
level = INFO
formatter = {{ 'message' if _active_formatter == 'generic' else _active_formatter }}
{%- endif %}

{%- if cookiecutter.log_syslog %}

[handler_syslog]
class = logging.handlers.SysLogHandler
args = (('{{ cookiecutter.log_syslog_host }}', {{ cookiecutter.log_syslog_port }}), {{ cookiecutter.log_syslog_facility }}, {{ '1' if cookiecutter.log_syslog_protocol == 'tcp' else '2' }})
level = NOTSET
formatter = {{ _active_formatter }}
{%- endif %}

{#- === Formatters === -#}

{%- if _active_formatter == 'generic' %}

[formatter_generic]
format = %(asctime)s %(levelname)-7.7s [%(name)s:%(lineno)s][%(threadName)s] %(message)s
{%- endif %}

{%- if _active_formatter == 'json' %}

{#- Requires python-json-logger package: pip install python-json-logger -#}
[formatter_json]
class = pythonjsonlogger.jsonlogger.JsonFormatter
format = %(asctime)s %(name)s %(levelname)s %(message)s %(module)s %(lineno)s %(threadName)s
{%- endif %}

{%- if _active_formatter == 'custom' %}

[formatter_custom]
class = {{ cookiecutter.log_format_class }}
format = {{ cookiecutter.log_format_string }}
{%- endif %}

{%- if 'message' in _formatter_keys %}

[formatter_message]
format = %(message)s
{%- endif %}

